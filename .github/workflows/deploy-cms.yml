name: Deploy CMS to VPS

# Required GitHub repository secrets:
#   VPS_HOST     - hostname or IP of your Virtualmin server
#   VPS_USER     - SSH username (e.g. minakshidewan)
#   VPS_SSH_KEY  - private SSH key (PEM format, full key contents)
#   VPS_SSH_PORT - SSH port (optional, defaults to 22)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch, tag, SHA)"
        required: false
        default: ""
  push:
    branches: [master]
    paths:
      - "minakshi-web/cms/**"
      - ".github/workflows/deploy-cms.yml"

concurrency:
  group: cms-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build and deploy Payload CMS
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CMS_DIR: minakshi-web/cms

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20.20.2"

      - name: Install CMS dependencies
        working-directory: ${{ env.CMS_DIR }}
        run: npm ci --no-audit --no-fund

      - name: Build CMS
        working-directory: ${{ env.CMS_DIR }}
        run: npm run build

      - name: Assemble artifact
        working-directory: ${{ env.CMS_DIR }}
        run: |
          set -euo pipefail
          OUT="cms-artifact"
          rm -rf "${OUT}" && mkdir -p "${OUT}"
          cp -a .next/standalone/. "${OUT}/"
          mkdir -p "${OUT}/.next"
          cp -a .next/static "${OUT}/.next/static"
          cp -a public/. "${OUT}/public/" 2>/dev/null || true
          cp -a src/. "${OUT}/src/"
          cp package.json package-lock.json next.config.mjs tsconfig.json "${OUT}/"
          cp .npmrc "${OUT}/" 2>/dev/null || true
          cp -a deploy/. "${OUT}/deploy/"
          rm -rf "${OUT}/tests" "${OUT}/playwright-report" "${OUT}/.next/cache"
          echo "Artifact size: $(du -sh ${OUT} | cut -f1)"

      - name: Validate artifact
        working-directory: ${{ env.CMS_DIR }}
        run: |
          test -f cms-artifact/server.js || (echo "ERROR: server.js missing" && exit 1)
          test -d cms-artifact/src        || (echo "ERROR: src/ missing" && exit 1)
          test -d cms-artifact/deploy     || (echo "ERROR: deploy/ missing" && exit 1)
          echo "Artifact OK"

      - name: Copy artifact to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "${{ env.CMS_DIR }}/cms-artifact/."
          target: "~/domains/cms.minakshidewan.com/public_html/"
          strip_components: 3
          command_timeout: 10m
          timeout: 10m

      - name: Run post-deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 15m
          timeout: 15m
          script: |
            set -euo pipefail
            echo "==[ $(date -u +%FT%TZ) ]== post-deploy starting"
            bash ~/domains/cms.minakshidewan.com/public_html/deploy/post-deploy.sh
            echo "==[ $(date -u +%FT%TZ) ]== post-deploy done"
